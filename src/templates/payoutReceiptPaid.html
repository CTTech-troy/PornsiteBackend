<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Payout Receipt — {{receiptNumber}}</title>
</head>
<body style="margin:0;padding:0;background:#F0F2F5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#F0F2F5;padding:32px 16px;">
  <tr><td align="center">
    <table width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(26,26,46,0.08);">
      <tr><td style="padding:28px 32px;border-bottom:1px solid #E5E7EB;">
        <table width="100%"><tr>
          <td><img src="{{logoUrl}}" alt="XstreamVideos" height="36" style="display:block;max-height:36px;"/></td>
          <td align="right"><span style="display:inline-block;background:#ECFDF5;color:#059669;font-size:11px;font-weight:700;letter-spacing:0.08em;padding:6px 12px;border-radius:100px;">PAID</span></td>
        </tr></table>
      </td></tr>
      <tr><td style="padding:32px;">
        <h1 style="margin:0 0 8px;font-size:22px;font-weight:800;color:#1A1A2E;">Withdrawal Receipt</h1>
        <p style="margin:0 0 24px;font-size:14px;color:#6B7280;">Receipt <strong>{{receiptNumber}}</strong> · {{paidAt}}</p>
        <table width="100%" cellpadding="0" cellspacing="0" style="border:1px solid #E5E7EB;border-radius:8px;">
          <tr><td style="padding:16px 20px;background:#F9FAFB;font-size:12px;font-weight:700;color:#6B7280;text-transform:uppercase;">Creator</td></tr>
          <tr><td style="padding:12px 20px;font-size:14px;color:#1A1A2E;"><strong>{{creatorName}}</strong><br/><span style="color:#6B7280;">ID: {{creatorId}}</span></td></tr>
          <tr><td style="padding:16px 20px;border-top:1px solid #E5E7EB;">
            <table width="100%" cellpadding="6" cellspacing="0">
              <tr><td style="font-size:13px;color:#6B7280;">Amount paid</td><td align="right" style="font-size:15px;font-weight:700;color:#1A1A2E;">{{amountUsd}}</td></tr>
              <tr><td style="font-size:13px;color:#6B7280;">Remaining balance</td><td align="right" style="font-size:14px;font-weight:600;color:#1A1A2E;">{{remainingBalance}}</td></tr>
              <tr><td style="font-size:13px;color:#6B7280;">Payment method</td><td align="right" style="font-size:14px;color:#1A1A2E;">{{paymentMethod}}</td></tr>
              <tr><td style="font-size:13px;color:#6B7280;">Transaction ID</td><td align="right" style="font-size:13px;font-family:monospace;color:#1A1A2E;">{{transactionId}}</td></tr>
            </table>
          </td></tr>
        </table>
        <div style="margin-top:28px;padding-top:20px;border-top:1px solid #E5E7EB;">
          <p style="margin:0 0 4px;font-size:13px;color:#6B7280;">Authorized by</p>
          <p style="margin:0;font-size:15px;font-weight:600;color:#1A1A2E;">{{ceoName}}</p>
          <p style="margin:8px 0 0;font-size:12px;color:#9CA3AF;">{{supportEmail}}</p>
        </div>
      </td></tr>
    </table>
  </td></tr>
</table>
</body>
</html>
