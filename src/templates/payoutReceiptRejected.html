<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Withdrawal Declined — {{receiptNumber}}</title>
</head>
<body style="margin:0;padding:0;background:#F0F2F5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#F0F2F5;padding:32px 16px;">
  <tr><td align="center">
    <table width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;background:#ffffff;border-radius:12px;overflow:hidden;">
      <tr><td style="padding:28px 32px;border-bottom:1px solid #E5E7EB;">
        <table width="100%"><tr>
          <td><img src="{{logoUrl}}" alt="XstreamVideos" height="36" style="display:block;max-height:36px;"/></td>
          <td align="right"><span style="display:inline-block;background:#FEF2F2;color:#DC2626;font-size:11px;font-weight:700;padding:6px 12px;border-radius:100px;">REJECTED</span></td>
        </tr></table>
      </td></tr>
      <tr><td style="padding:32px;">
        <h1 style="margin:0 0 8px;font-size:22px;font-weight:800;color:#1A1A2E;">Withdrawal Declined</h1>
        <p style="margin:0 0 24px;font-size:14px;color:#6B7280;">Receipt <strong>{{receiptNumber}}</strong> · {{rejectedAt}}</p>
        <p style="margin:0 0 16px;font-size:15px;color:#374151;">Hi <strong>{{creatorName}}</strong>, your withdrawal of <strong>{{amountUsd}}</strong> was declined. Funds were returned to your wallet.</p>
        <div style="background:#FEF2F2;border-left:4px solid #EF4444;padding:16px 20px;margin-bottom:24px;border-radius:0 8px 8px 0;">
          <p style="margin:0 0 6px;font-size:12px;font-weight:700;color:#991B1B;">Reason</p>
          <p style="margin:0;font-size:14px;color:#374151;">{{reason}}</p>
        </div>
        <p style="margin:0;font-size:13px;color:#6B7280;">Questions? Contact <a href="mailto:{{supportEmail}}" style="color:#FF4654;">{{supportEmail}}</a></p>
        <p style="margin:16px 0 0;font-size:13px;color:#9CA3AF;">{{ceoName}}</p>
      </td></tr>
    </table>
  </td></tr>
</table>
</body>
</html>
