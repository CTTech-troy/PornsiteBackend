name: xstream-platform

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-5043}
      PAYMENT_SERVICE_URL: http://payment-service:10000
      PAYMENT_SERVICE_SHARED_SECRET: ${PAYMENT_SERVICE_SHARED_SECRET:-}
      AI_MODERATION_SERVICE_URL: http://ai-gateway:${AI_GATEWAY_PORT:-8000}
    ports:
      - "${BACKEND_PORT:-5043}:${BACKEND_PORT:-5043}"
    depends_on:
      payment-service:
        condition: service_started
      ai-gateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - xstream

  payment-service:
    build:
      context: ../payment-service
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:10000
      PAYMENT_SERVICE_SHARED_SECRET: ${PAYMENT_SERVICE_SHARED_SECRET:-}
      PAYMENT_DEFAULT_PROVIDER: ${PAYMENT_DEFAULT_PROVIDER:-paystack}
      PAYMENT_AFRICA_PROVIDER: ${PAYMENT_AFRICA_PROVIDER:-flutterwave}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY:-}
      PAYSTACK_CALLBACK_URL: ${PAYSTACK_CALLBACK_URL:-http://xstreamvideos.site/payment/success}
      PAYSTACK_CANCEL_URL: ${PAYSTACK_CANCEL_URL:-http://xstreamvideos.site/payment/cancel}
      FLUTTERWAVE_PUBLIC_KEY: ${FLUTTERWAVE_PUBLIC_KEY:-}
      FLUTTERWAVE_SECRET_KEY: ${FLUTTERWAVE_SECRET_KEY:-}
      FLUTTERWAVE_ENCRYPTION_KEY: ${FLUTTERWAVE_ENCRYPTION_KEY:-}
      FLUTTERWAVE_REDIRECT_URL: ${FLUTTERWAVE_REDIRECT_URL:-http://xstreamvideos.site/payment/success}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-http://xstreamvideos.site/payment/success}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-http://xstreamvideos.site/payment/cancel}
    ports:
      - "10000:10000"
    restart: unless-stopped
    networks:
      - xstream

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        APP_DIR: frontend
        VITE_API_URL: ${BACKEND_PUBLIC_URL:-https://pornsitebackend.onrender.com}
        VITE_SOCKET_URL: ${BACKEND_PUBLIC_URL:-https://pornsitebackend.onrender.com}
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      - xstream

  admin:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        APP_DIR: admin
        VITE_API_URL: ${BACKEND_PUBLIC_URL:-https://pornsitebackend.onrender.com}
        VITE_SOCKET_URL: ${BACKEND_PUBLIC_URL:-https://pornsitebackend.onrender.com}
    ports:
      - "8081:80"
    restart: unless-stopped
    networks:
      - xstream

  ai-gateway:
    build:
      context: ../ai
      dockerfile: Dockerfile
    env_file:
      - ../ai/.env
    environment:
      PORT: ${AI_GATEWAY_PORT:-8000}
      BACKEND_URL: https://pornsitebackend.onrender.com
      MODEL_CACHE_DIR: /models
    ports:
      - "${AI_GATEWAY_PORT:-8000}:${AI_GATEWAY_PORT:-8000}"
    volumes:
      - ai-model-cache:/models
    restart: unless-stopped
    networks:
      - xstream

  ai-worker:
    build:
      context: ../ai
      dockerfile: Dockerfile
    env_file:
      - ../ai/.env
    environment:
      BACKEND_URL: https://pornsitebackend.onrender.com
      MODEL_CACHE_DIR: /models
    command: ["python", "-m", "workers.worker"]
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ai-model-cache:/models
    restart: unless-stopped
    networks:
      - xstream

  nginx:
    build:
      context: ..
      dockerfile: frontend/nginx/Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
      admin:
        condition: service_started
    restart: unless-stopped
    networks:
      - xstream

volumes:
  ai-model-cache:

networks:
  xstream:
    driver: bridge
